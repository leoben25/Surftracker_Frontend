<app-menu></app-menu>

<div style="background-color: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px 20px; width: 100%;">
  
  <div style="width: 100%; max-width: 1000px; margin: 0 auto 50px auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden;">
    <div style="background-color: #006674; color: #ffffff; padding: 30px; text-align: center;">
      <h1 style="margin: 0; font-weight: bold; font-size: 2.5rem;">Gestión de Reportes de Precisión</h1>
    </div>

    <div style="padding: 40px;">
      <form>
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label font-weight-bold text-dark fs-4">Pronóstico Teórico</label>
            <select class="form-select custom-input py-3 fs-4">
              <option selected disabled>Seleccione el pronóstico</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label font-weight-bold text-dark fs-4">Observación Real (Playa)</label>
            <select class="form-select custom-input py-3 fs-4">
              <option selected disabled>Seleccione la observación</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label font-weight-bold text-dark fs-4">Fecha de Reporte</label>
            <input type="date" class="form-control custom-input py-3 fs-4">
          </div>

          <div class="col-md-4">
            <label class="form-label font-weight-bold text-dark fs-4">Porcentaje de Precisión (%)</label>
            <input type="number" step="0.1" class="form-control custom-input py-3 fs-4" placeholder="Ej. 92.5">
          </div>

          <div class="col-md-4">
            <label class="form-label font-weight-bold text-dark fs-4">Diferencia Geométrica / Métrica</label>
            <input type="number" step="0.01" class="form-control custom-input py-3 fs-4" placeholder="Ej. 0.35">
          </div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
          <button type="submit" class="btn text-white px-5 py-3 font-weight-bold border-0 fs-3" style="background-color: #006674; border-radius: 8px; min-width: 250px; display: inline-block;">
            Enviar
          </button>
        </div>
      </form>
    </div>
  </div>

  <div style="width: 100%; max-width: 1100px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden;">
    <div style="background-color: #006674; color: #ffffff; padding: 25px; text-align: center;">
      <h2 style="margin: 0; font-weight: bold; font-size: 2rem;">Consultas de Precisión</h2>
    </div>
    
    <div style="padding: 40px;">
      <div class="row g-3 align-items-end mb-5 justify-content-center">
        <div class="col-md-6">
          <label class="form-label font-weight-bold text-dark fs-4">Filtrar por Fecha de Reporte</label>
          <input type="date" class="form-control custom-input py-3 fs-4">
        </div>
        <div class="col-md-4">
          <button type="button" class="btn text-white w-100 py-3 font-weight-bold border-0 fs-4" style="background-color: #006674; border-radius: 8px;">
            Limpiar Filtro
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle text-center fs-4">
          <thead class="table-light">
            <tr style="color: #006674; font-weight: bold;">
              <th scope="col" class="py-3">ID Reporte</th>
              <th scope="col" class="py-3">ID Pronóstico</th>
              <th scope="col" class="py-3">ID Observación</th>
              <th scope="col" class="py-3">Precisión</th>
              <th scope="col" class="py-3">Diferencia</th>
              <th scope="col" class="py-3">Fecha Reporte</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="6" class="text-muted py-5 fs-4">No se encontraron reportes.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
