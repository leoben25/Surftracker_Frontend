<app-menu></app-menu>

<div class="container">
  <div class="titulo">
    <h2>Consulta de Pronósticos por Localización</h2>
  </div>

  <form [formGroup]="forms" (ngSubmit)="consultaPronostico()" class="formulario">
    <div class="row-filtro">
      <div class="col">
        <label>Código de Localización</label>
        <input type="number" formControlName="idLocalizacion" placeholder="Ingrese el ID de localización (ej. 1)">
      </div>
      <div class="col-boton">
        <button type="submit">Buscar Pronósticos</button>
      </div>
    </div>
  </form>

  <div class="tabla-contenedor" *ngIf="dataSource">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">

      <ng-container matColumnDef="idPronostico">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.idPronostico}} </td>
      </ng-container>

      <ng-container matColumnDef="idLocalizacion">
        <th mat-header-cell *matHeaderCellDef> Localización </th>
        <td mat-cell *matCellDef="let element"> {{element.idLocalizacion}} </td>
      </ng-container>

      <ng-container matColumnDef="fechaPronostico">
        <th mat-header-cell *matHeaderCellDef> Fecha </th>
        <td mat-cell *matCellDef="let element"> {{element.fechaPronostico}} </td>
      </ng-container>

      <ng-container matColumnDef="temperatura">
        <th mat-header-cell *matHeaderCellDef> Temp. (°C) </th>
        <td mat-cell *matCellDef="let element"> {{element.temperatura}}°C </td>
      </ng-container>

      <ng-container matColumnDef="alturaOlas">
        <th mat-header-cell *matHeaderCellDef> Altura Olas (m) </th>
        <td mat-cell *matCellDef="let element"> {{element.alturaOlas}}m </td>
      </ng-container>

      <ng-container matColumnDef="velocidadViento">
        <th mat-header-cell *matHeaderCellDef> Viento (km/h) </th>
        <td mat-cell *matCellDef="let element"> {{element.velocidadViento}} km/h </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <button class="btn-tabla" title="Ver detalle">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </div>
</div>
